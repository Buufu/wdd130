<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="description" content="Contact White Water Rafting for reservations, questions, or suggestions. Find our location, phone number, and send us a message.">
  <meta name="author" content="Andrew Ssebuufu">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us | White Water Rafting</title>

  <link rel="stylesheet" href="styles/rafting.css">
</head>
<body>

<header>
  <img src="https://byui-cse.github.io/wdd130-ww-course/resources/images/logos/z-boat-splash.png" alt="Rafting Company Logo">

  <nav>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About Us</a></li>
      <li><a href="trips.html">Trips</a></li>
      <li><a href="contact.html">Contact Us</a></li>
    </ul>
  </nav>
</header>

<main>

  <h1>Contact Us</h1>

  <!-- Company Info -->
  <section class="contact-info">
    <h2>White Water Rafting Company</h2>
    <p>123 Main River Street</p>
    <p>Kolob, Kampala</p>
    <p>📞 +256 499 999 4444</p>
    <p>📧 info@whitewater.com</p>
  </section>

  <!-- Map + Form -->
  <section class="contact-layout">

    <!-- Google Map -->
    <div class="map">
      <iframe 
        src="https://www.google.com/maps?q=Kolob,California&output=embed"
        loading="lazy">
      </iframe>
    </div>

    <!-- Contact Form -->
    <form class="contact-form">

      <label for="name">Name</label>
      <input type="text" id="name" name="name" placeholder="Your Name" required>

      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="Your Email" required>

      <fieldset>
        <legend>Message Purpose</legend>

        <label>
          <input type="radio" id="general" name="purpose" value="inquiry" required>
          General Inquiry
        </label>

        <label>
          <input type="radio" id="reservation" name="purpose" value="reservation">
          Reservation Question
        </label>

        <label>
          <input type="radio" id="suggestion" name="purpose" value="suggestion">
          Website Suggestion
        </label>
      </fieldset>

      <label for="message">Message</label>
      <textarea id="message" name="message" rows="4"></textarea>

      <label>
        <input type="checkbox" id="newsletter" name="subscribe">
        Please subscribe me to the monthly newsletter
      </label>

      <button type="submit">Get in Touch!</button>

    </form>

  </section>

  <!-- Employees -->
  <section class="employees">
    <h2>We Are Here to Serve You</h2>

    <figure>
      <img src="images/employee1.jpg" alt="River Guide">
      <figcaption>John Smith – River Guide</figcaption>
    </figure>

    <figure>
      <img src="images/employee2.jpg" alt="Operations Manager">
      <figcaption>Sarah Lee – Operations Manager</figcaption>
    </figure>

    <figure>
      <img src="images/employee3.jpg" alt="Safety Instructor">
      <figcaption>Mike Brown – Safety Instructor</figcaption>
    </figure>

  </section>

</main>

<footer>
  <p>© 2026 💦 White Water Rafting Co. 💦 | Andrew Ssebuufu</p>

  <nav class="socialmedia">
    <a href="https://facebook.com">
      <img src="https://byui-cse.github.io/wdd130-ww-course/resources/images/icons/facebook.svg" alt="Facebook">
    </a>
    <a href="https://linkedin.com">
      <img src="https://byui-cse.github.io/wdd130-ww-course/resources/images/icons/linkedin.svg" alt="LinkedIn">
    </a>
    <a href="https://instagram.com">
      <img src="https://byui-cse.github.io/wdd130-ww-course/resources/images/icons/instagram.svg" alt="Instagram">
    </a>
  </nav>
</footer>

</body>
</html>
